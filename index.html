<!DOCTYPE html>
<html>

<head>
<title>Puffy Must Dos</title>
</head>

<body>

<h1>Puffy Must Dos</h1>

<h2>Daily Must-Dos</h2>

<ul>
<li><input type="checkbox"> 20-30 min Piano Practice</li>
<li><input type="checkbox"> 30 min Reading</li>
</ul>

<h2>Weekly Must-Dos</h2>

<ul>
<li><input type="checkbox"> AoPS</li>
<li><input type="checkbox"> MrMath</li>
<li><input type="checkbox"> Coding</li>
</ul>

<h2>🔒 Locks</h2>

<div>

<h3>DonutSMP Ban Lock</h3>

<button onclick="startLock()">Start Ban Lock</button>

<p>Time Remaining: <span id="lockTimer">Not active</span></p>

</div>

<script>

let lockEnd = localStorage.getItem("lockEnd")

function startLock(){

let end = new Date().getTime() + ((8*24*60*60 + 23*60*60 + 22*60 + 30) * 1000)

localStorage.setItem("lockEnd", end)

lockEnd = end
}

setInterval(()=>{

lockEnd = localStorage.getItem("lockEnd")

if(!lockEnd){
document.getElementById("lockTimer").innerText = "Not active"
return
}

let now = new Date().getTime()
let distance = lockEnd - now

if(distance <= 0){
document.getElementById("lockTimer").innerText = "Lock finished"
localStorage.removeItem("lockEnd")
return
}

let days = Math.floor(distance/(1000*60*60*24))
let hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60))
let minutes = Math.floor((distance%(1000*60*60))/(1000*60))
let seconds = Math.floor((distance%(1000*60))/1000)

document.getElementById("lockTimer").innerText =
days+"d "+hours+"h "+minutes+"m "+seconds+"s"

},1000)

</script>

</body>

</html>
