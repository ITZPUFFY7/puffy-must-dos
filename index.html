<!DOCTYPE html>
<html>

<head>
<title>Puffy Must-Dos</title>

<style>
body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

ul{
list-style:none;
padding:0;
}

li{
margin:10px;
font-size:18px;
}

progress{
width:300px;
height:20px;
}
</style>

</head>

<body>

<h1>Puffy Must-Dos</h1>

<h3>Progress</h3>
<progress id="progress" value="0" max="5"></progress>

<h2>Daily Must-Dos</h2>
<ul>
<li><input type="checkbox" onclick="updateProgress()"> 20–30 min Piano Practice</li>
<li><input type="checkbox" onclick="updateProgress()"> 30 min Reading</li>
</ul>

<h2>Weekly Must-Dos</h2>
<ul>
<li><input type="checkbox" onclick="updateProgress()"> AoPS</li>
<li><input type="checkbox" onclick="updateProgress()"> MrMath</li>
<li><input type="checkbox" onclick="updateProgress()"> Coding</li>
</ul>

<script>

const boxes = document.querySelectorAll("input[type='checkbox']")
const progress = document.getElementById("progress")

boxes.forEach((box, index) => {

  // load saved state
  const saved = localStorage.getItem("task" + index)
  if(saved === "true"){
    box.checked = true
  }

  box.addEventListener("change", () => {
    localStorage.setItem("task" + index, box.checked)
    updateProgress()
  })

})

function updateProgress(){
  let count = 0

  boxes.forEach(box=>{
    if(box.checked){
      count++
    }
  })

  progress.value = count
}

updateProgress()

</script>
  
</body>

</html>
