<!DOCTYPE html>
<html>

<head>
<title>Puffy Must Dos</title>

<style>
body{
font-family: Arial;
text-align: center;
background:#f5f5f5;
}

.box{
background:white;
padding:20px;
margin:20px auto;
width:350px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

progress{
width:100%;
height:20px;
}
</style>

</head>

<body>

<h1>Puffy Must Dos</h1>

<div class="box">
<h2>Daily Must-Dos</h2>

<label><input type="checkbox" class="task" id="task1"> Piano Practice (20-30 min)</label><br>
<label><input type="checkbox" class="task" id="task2"> Read Book (30 min)</label>
</div>

<div class="box">
<h2>Weekly Must-Dos</h2>

<label><input type="checkbox" class="task" id="task3"> AoPS</label><br>
<label><input type="checkbox" class="task" id="task4"> MrMath</label><br>
<label><input type="checkbox" class="task" id="task5"> Coding</label>
</div>

<div class="box">
<h2>Progress</h2>
<progress id="progressBar" value="0" max="5"></progress>
</div>

<div class="box">
<h2>🔒 Locks</h2>
<h3>DonutSMP Ban Lock</h3>
<p id="lockTimer"></p>
</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

const tasks = document.querySelectorAll(".task")
const progress = document.getElementById("progressBar")

function updateProgress(){
let checked = document.querySelectorAll(".task:checked").length
progress.value = checked
}

tasks.forEach(task => {

let savedState = localStorage.getItem(task.id)

if(savedState === "true"){
task.checked = true
}

task.addEventListener("change", function(){

localStorage.setItem(task.id, task.checked)

updateProgress()

})

})

updateProgress()

let lockEnd = localStorage.getItem("lockEnd")

if(!lockEnd){

lockEnd = Date.now() + ((8*24*60*60 + 23*60*60 + 22*60 + 30) * 1000)

localStorage.setItem("lockEnd", lockEnd)

}

setInterval(function(){

lockEnd = localStorage.getItem("lockEnd")

let now = Date.now()

let distance = lockEnd - now

if(distance <= 0){

document.getElementById("lockTimer").innerText = "Lock Finished"
return

}

let days = Math.floor(distance/(1000*60*60*24))
let hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60))
let minutes = Math.floor((distance%(1000*60*60))/(1000*60))
let seconds = Math.floor((distance%(1000*60))/1000)

document.getElementById("lockTimer").innerText =
days + "d " + hours + "h " + minutes + "m " + seconds + "s"

},1000)

})

</script>

</body>
</html>
